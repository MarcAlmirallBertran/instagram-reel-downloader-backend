# Shared env vars for web + worker
x-common-env: &common-env
  DATABASE_URL: postgresql://postgres:1234@postgres:5432/postgres
  REDIS_URL: redis://redis:6379
  # Set these in your shell or a .env file before running docker compose up
  ENCRYPTION_KEY: ${ENCRYPTION_KEY}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-in-production}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  MEDIA_DIR: /data/reels

services:
  postgres:
    image: postgres:16
#    ports:
#      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - instagram-reel-downloader

  redis:
    image: redis:7-alpine
#    ports:
#      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - instagram-reel-downloader

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_data:/data/reels
    command: ["uv", "run", "fastapi", "run", "app/main.py", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - instagram-reel-downloader

  worker:
    build: .
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - media_data:/data/reels
    command: ["uv", "run", "taskiq", "worker", "app.broker:broker"]
    networks:
      - instagram-reel-downloader

networks:
  instagram-reel-downloader:
    name: instagram-reel-downloader

volumes:
  postgres_data:
  media_data:
